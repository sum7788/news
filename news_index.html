<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 정비사업 뉴스</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3; --surface: #fff; --border: #e4e2db;
  --text: #1a1916; --text2: #5c5a54; --text3: #9c9a93;
  --accent: #2c5f2e; --accent-light: #eaf3de;
  --font: "Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
}
body { background: var(--bg); font-family: var(--font); color: var(--text); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 18px; font-weight: 700; }
.logo span { color: var(--accent); }
.badge { background: var(--accent-light); color: var(--accent); font-size: 12px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.meta { font-size: 11px; color: var(--text3); margin-left: auto; }
.link-btn { background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 8px; text-decoration: none; white-space: nowrap; }

.search-bar { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.search-bar input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); font-size: 14px; color: var(--text); outline: none; font-family: var(--font); }
.search-bar input:focus { border-color: var(--accent); background: var(--surface); }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.pill { padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text2); font-family: var(--font); white-space: nowrap; transition: all .12s; }
.pill:hover { border-color: #aaa; color: var(--text); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.main { max-width: 860px; margin: 0 auto; padding: 16px 20px; }
.result-info { font-size: 12px; color: var(--text3); margin-bottom: 14px; }

.news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; transition: border-color .12s, box-shadow .12s; }
.news-card:hover { border-color: #c5c3bb; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
.news-title { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 8px; }
.news-title a { color: var(--text); text-decoration: none; }
.news-title a:hover { color: var(--accent); }
.news-summary { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.news-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.news-source { font-size: 11px; color: var(--text3); background: var(--bg); padding: 2px 8px; border-radius: 99px; }
.news-date { font-size: 11px; color: var(--text3); }
.news-link { font-size: 11px; color: var(--accent); font-weight: 600; text-decoration: none; margin-left: auto; }
.news-link:hover { text-decoration: underline; }

.keyword-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #e6f1fb; color: #185FA5; border: 1px solid #cce0f5; font-weight: 500; }

.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

.loading { text-align: center; padding: 60px 20px; color: var(--text3); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🏗️ 서울 <span>정비사업</span> 뉴스</div>
    <span class="badge" id="totalBadge">로딩 중</span>
    <span class="meta" id="updatedAt"></span>
    <a href="https://sum7788.github.io/seoul/seoul.html" target="_blank" class="link-btn">🗺️ 탐색기</a>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="키워드 검색..." oninput="renderNews()">
  </div>
</div>

<div class="filters" id="keywordFilters">
  <button class="pill active" onclick="setKeyword('all',this)">전체</button>
  <button class="pill" onclick="setKeyword('통합심의',this)">통합심의</button>
  <button class="pill" onclick="setKeyword('재개발',this)">재개발</button>
  <button class="pill" onclick="setKeyword('재건축',this)">재건축</button>
  <button class="pill" onclick="setKeyword('한남',this)">한남</button>
  <button class="pill" onclick="setKeyword('노량진',this)">노량진</button>
  <button class="pill" onclick="setKeyword('목동',this)">목동</button>
  <button class="pill" onclick="setKeyword('여의도',this)">여의도</button>
</div>

<div class="main">
  <div class="result-info" id="resultInfo"></div>
  <div id="newsList">
    <div class="loading">
      <div class="spinner"></div>
      <div>뉴스를 불러오는 중...</div>
    </div>
  </div>
</div>

<script>
var NEWS_URL = 'https://raw.githubusercontent.com/sum7788/news/main/data/news.json';
var allNews = [];
var curKeyword = 'all';

function setKeyword(kw, el) {
  curKeyword = kw;
  document.querySelectorAll('.filters .pill').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  renderNews();
}

function renderNews() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var list = allNews.filter(function(item) {
    var text = (item.title + ' ' + (item.summary || '')).toLowerCase();
    var matchQ = !q || text.indexOf(q) >= 0;
    var matchKw = curKeyword === 'all' || text.indexOf(curKeyword) >= 0;
    return matchQ && matchKw;
  });

  document.getElementById('resultInfo').textContent = list.length + '건 표시 중 (전체 ' + allNews.length + '건)';
  document.getElementById('totalBadge').textContent = allNews.length + '건';

  var wrap = document.getElementById('newsList');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>해당 조건의 뉴스가 없어요</div></div>';
    return;
  }

  wrap.innerHTML = list.map(function(item) {
    var keywords = detectKeywords(item.title + ' ' + (item.summary || ''));
    return '<div class="news-card">' +
      '<div class="news-title"><a href="' + item.url + '" target="_blank">' + item.title + '</a></div>' +
      (item.summary ? '<div class="news-summary">' + item.summary + '</div>' : '') +
      '<div class="news-footer">' +
        '<span class="news-source">' + (item.source || '네이버뉴스') + '</span>' +
        '<span class="news-date">' + (item.date || '') + '</span>' +
        keywords.map(function(k) { return '<span class="keyword-tag">' + k + '</span>'; }).join('') +
        '<a class="news-link" href="' + item.url + '" target="_blank">원문 보기 →</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function detectKeywords(text) {
  var kws = ['통합심의','재개발','재건축','한남','노량진','목동','여의도','흑석','용산','강남','성수','마포'];
  return kws.filter(function(k) { return text.indexOf(k) >= 0; }).slice(0, 3);
}

fetch(NEWS_URL)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    allNews = data.items || [];
    if (data.updated) {
      document.getElementById('updatedAt').textContent = '최종 수집: ' + data.updated;
    }
    renderNews();
  })
  .catch(function() {
    document.getElementById('newsList').innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div>' +
      '<div style="font-weight:600;margin-bottom:6px">아직 수집된 뉴스가 없어요</div>' +
      '<div style="font-size:12px">GitHub Actions가 실행되면 자동으로 채워져요</div></div>';
    document.getElementById('totalBadge').textContent = '0건';
  });
</script>
</body>
</html>
